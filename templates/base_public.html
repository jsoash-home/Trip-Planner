<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}Trip Yearbook — Vacation Planner{% endblock %}</title>

  <script>
    // Minimal sync theme init (no localStorage write — public guests
    // shouldn't have site preferences saved). Just follow the OS.
    (function () {
      try {
        var theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-bs-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.setAttribute('data-bs-theme', 'light');
      }
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="vp-public">
  <main id="main-content" class="container" tabindex="-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="vp-public-footer">
    <p class="text-muted small">
      📓 Powered by
      <a href="{{ url_for('index') }}">Vacation Planner</a>
    </p>
  </footer>
</body>
</html>
