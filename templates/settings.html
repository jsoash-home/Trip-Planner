{% extends "base.html" %}
{% block title %}Settings · Vacation Planner{% endblock %}

{% block content %}
<h1 class="h4 mb-3">⚙️ Settings</h1>

<form method="post" action="{{ url_for('settings') }}" class="vp-settings-form">
  <fieldset class="mb-4">
    <legend class="h6 text-muted">Temperature units</legend>
    <p class="small text-muted mb-2">
      Choose how forecasts display on your itinerary and trip overview.
    </p>

    <div class="form-check">
      <input class="form-check-input"
             type="radio"
             name="weather_units"
             id="weather_units_metric"
             value="metric"
             {% if current_user.weather_units != "imperial" %}checked{% endif %}>
      <label class="form-check-label" for="weather_units_metric">
        Celsius (°C)
      </label>
    </div>

    <div class="form-check">
      <input class="form-check-input"
             type="radio"
             name="weather_units"
             id="weather_units_imperial"
             value="imperial"
             {% if current_user.weather_units == "imperial" %}checked{% endif %}>
      <label class="form-check-label" for="weather_units_imperial">
        Fahrenheit (°F)
      </label>
    </div>
  </fieldset>

  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
